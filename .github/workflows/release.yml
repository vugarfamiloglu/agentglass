name: Release

# Cutting a tag publishes the container image. Publishing to npm stays manual —
# `npm publish` from a machine that's logged in.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # An image that builds but won't boot is worse than no image.
      - name: Smoke-test the published image
        run: |
          IMAGE=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          docker run -d --name ag -p 4319:4319 -e AGENTGLASS_SIMULATE=0 "$IMAGE"
          for i in $(seq 1 30); do
            curl -sf http://localhost:4319/api/health >/dev/null && break
            sleep 1
          done
          curl -sf http://localhost:4319/api/health | tee /dev/stderr | grep -q '"service":"agentglass"'
          docker logs ag
          docker rm -f ag
